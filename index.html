<!doctype html>
<html lang="vi" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PHUCRAM AI</title>
    <style>
        :root {
            --bg-color: #131314;
            --text-color: #e3e3e3;
            --accent-color: #4285f4;
            --input-bg: #1e1f20;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        header {
            padding: 20px;
            font-size: 24px;
            font-weight: bold;
            color: var(--accent-color);
            text-align: center;
            border-bottom: 1px solid #333;
        }
        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 18px;
            line-height: 1.5;
        }
        .user-msg {
            align-self: flex-end;
            background-color: #37393b;
        }
        .ai-msg {
            align-self: flex-start;
            background-color: transparent;
            border: 1px solid #444;
        }
        .input-area {
            padding: 20px;
            background-color: var(--bg-color);
        }
        .input-box {
            display: flex;
            background-color: var(--input-bg);
            border-radius: 30px;
            padding: 10px 20px;
            align-items: center;
        }
        input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            font-size: 16px;
            outline: none;
            padding: 10px;
        }
        button {
            background: var(--accent-color);
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>

<header>PHUCRAM AI</header>

<div id="chat-container">
    <div class="message ai-msg">Xin chào! Tôi là <b>PHUCRAM AI</b>. Tôi có thể giúp gì cho bạn hôm nay?</div>
</div>

<div class="input-area">
    <div class="input-box">
        <input type="text" id="userInput" placeholder="Nhập câu hỏi tại đây...">
        <button onclick="sendMessage()">Gửi</button>
    </div>
</div>

<script>
    function sendMessage() {
        const input = document.getElementById('userInput');
        const container = document.getElementById('chat-container');
        
        if (input.value.trim() === "") return;

        // Hiển thị tin nhắn người dùng
        const userDiv = document.createElement('div');
        userDiv.className = 'message user-msg';
        userDiv.textContent = input.value;
        container.appendChild(userDiv);

        const prompt = input.value;
        input.value = "";

        // Giả lập PHUCRAM AI trả lời
        setTimeout(() => {
            const aiDiv = document.createElement('div');
            aiDiv.className = 'message ai-msg';
            aiDiv.innerHTML = "<b>PHUCRAM AI:</b> Tôi đã nhận được yêu cầu: '" + prompt + "'. Tính năng xử lý dữ liệu đang được thiết lập!";
            container.appendChild(aiDiv);
            container.scrollTop = container.scrollHeight;
        }, 500);
    }

    // Nhấn Enter để gửi
    document.getElementById('userInput').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') {
            sendMessage();
        }
    });
</script>

</body>
</html>
